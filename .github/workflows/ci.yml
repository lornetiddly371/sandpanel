name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - beta

permissions:
  contents: read

jobs:
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Run backend tests
        run: go test ./...

      - name: Build backend binary
        run: go build -o sandpanel-backend ./cmd/server

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandpanel-web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sandpanel-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build

  docker:
    name: Docker Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend-go
            file: ./backend-go/Dockerfile
          - name: frontend
            context: ./sandpanel-web
            file: ./sandpanel-web/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          provenance: false
