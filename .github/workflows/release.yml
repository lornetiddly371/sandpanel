name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest-tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: next-version
        run: |
          current="${{ steps.latest-tag.outputs.tag }}"
          current="${current#v}"
          IFS='.' read -r major minor patch <<< "$current"

          # Scan commit messages since last tag for version bump signals
          if [ "${{ steps.latest-tag.outputs.tag }}" = "v0.0.0" ]; then
            commits=$(git log --pretty=format:"%s")
          else
            commits=$(git log "${{ steps.latest-tag.outputs.tag }}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          fi

          if [ -z "$commits" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since last tag, skipping"
            exit 0
          fi

          if echo "$commits" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$commits" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          version="v${major}.${minor}.${patch}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

      - name: Check if version already exists
        if: steps.next-version.outputs.skip != 'true'
        id: check-tag
        run: |
          if git rev-parse "${{ steps.next-version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.next-version.outputs.skip != 'true' && steps.check-tag.outputs.exists == 'false'
        id: changelog
        run: |
          tag="${{ steps.latest-tag.outputs.tag }}"
          version="${{ steps.next-version.outputs.version }}"

          # Use all commits if first release, otherwise since last tag
          if [ "$tag" = "v0.0.0" ]; then
            range="HEAD"
          else
            range="${tag}..HEAD"
          fi

          {
            echo "changelog<<CHANGELOG_EOF"

            # Breaking changes
            breaking=$(git log "$range" --pretty=format:"- %s (%h)" --grep="BREAKING CHANGE" --grep="^feat.*!:" -i 2>/dev/null || true)
            if [ -n "$breaking" ]; then
              echo "### ⚠️ Breaking Changes"
              echo "$breaking"
              echo ""
            fi

            # Features
            feats=$(git log "$range" --pretty=format:"- %s (%h)" --grep="^feat" -i 2>/dev/null | grep -v "!:" || true)
            if [ -n "$feats" ]; then
              echo "### ✨ Features"
              echo "$feats"
              echo ""
            fi

            # Fixes
            fixes=$(git log "$range" --pretty=format:"- %s (%h)" --grep="^fix" -i 2>/dev/null || true)
            if [ -n "$fixes" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$fixes"
              echo ""
            fi

            # Docs
            docs=$(git log "$range" --pretty=format:"- %s (%h)" --grep="^docs" -i 2>/dev/null || true)
            if [ -n "$docs" ]; then
              echo "### 📝 Documentation"
              echo "$docs"
              echo ""
            fi

            # CI / chore / refactor
            infra=$(git log "$range" --pretty=format:"- %s (%h)" --grep="^ci" --grep="^chore" --grep="^refactor" --grep="^build" -i 2>/dev/null || true)
            if [ -n "$infra" ]; then
              echo "### 🔧 Maintenance"
              echo "$infra"
              echo ""
            fi

            # Separator
            echo "---"
            echo ""

            # Quick start
            echo "### 🚀 Quick Start"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/jocxfin/sandpanel.git"
            echo "cd sandpanel"
            echo "cp .env.example .env"
            echo "# edit .env with your RCON password and ports"
            echo "docker compose up --build -d"
            echo '```'
            echo ""
            echo "Or pull pre-built images:"
            echo ""
            echo '```bash'
            echo "BACKEND_IMAGE=jocxfin/sandpanel-backend:${version}"
            echo "FRONTEND_IMAGE=jocxfin/sandpanel-frontend:${version}"
            echo "docker compose up -d"
            echo '```'
            echo ""
            echo "Open \`http://localhost:22369\` — default admin password is in the backend logs:"
            echo ""
            echo '```bash'
            echo 'docker logs sandpanel-backend 2>&1 | grep password'
            echo '```'
            echo ""

            if [ "$tag" != "v0.0.0" ]; then
              echo "**Full diff:** [\`${tag}...${version}\`](https://github.com/jocxfin/sandpanel/compare/${tag}...${version})"
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.next-version.outputs.skip != 'true' && steps.check-tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next-version.outputs.version }}" -m "Release ${{ steps.next-version.outputs.version }}"
          git push origin "${{ steps.next-version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.next-version.outputs.skip != 'true' && steps.check-tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next-version.outputs.version }}
          name: SandPanel ${{ steps.next-version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
