name: Promote to Main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'release' to confirm merging beta into main"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Merge beta → main
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'release'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge beta into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin beta main
          git checkout main
          git merge origin/beta --no-edit
          git push origin main

      - name: Create summary
        run: |
          echo "## 🚀 Promoted beta → main" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This will trigger the release workflow to create a new version and publish Docker images." >> "$GITHUB_STEP_SUMMARY"
