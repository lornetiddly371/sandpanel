name: Issue Triage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-triage new issues
    runs-on: ubuntu-latest
    steps:
      - name: Add default labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Add priority label if none set
            const hasPriority = labels.some(l => l.startsWith('priority:'));
            if (!hasPriority) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['triage']
              });
            }

      - name: Assign to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                assignees: ['Copilot']
              });
            } catch (e) {
              // Copilot may not be assignable yet, skip silently
              console.log('Could not assign Copilot:', e.message);
            }

      - name: Welcome message
        if: >-
          !contains(github.event.issue.labels.*.name, 'enhancement')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const isBug = issue.labels.some(l => l.name === 'bug');
            let body;
            if (isBug) {
              body = `Thanks for the bug report! This has been added to the triage queue.\n\nIn the meantime, make sure you're running the latest version:\n\`\`\`bash\ndocker compose pull && docker compose up -d\n\`\`\``;
            } else {
              body = `Thanks for opening this issue! It's been added to the triage queue and will be reviewed soon.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body
            });

  add-to-project:
    name: Add to project board
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/jocxfin/projects/3
          github-token: ${{ secrets.PROJECT_TOKEN }}
