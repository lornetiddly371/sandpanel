name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below. Even rough ideas are welcome.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing or frustrating about the current behavior?
      placeholder: "I often need to restart the server after changing mods, but there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: "A button that automatically restarts the server when mod order changes..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Server Control
        - Configuration Editor
        - Mod Management / Mod.io
        - Player Tracking / Moderation
        - Profiles
        - SteamCMD
        - RCON / Console
        - Logs
        - Monitoring
        - User Management
        - UI / UX
        - Docker / Installation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I've checked existing issues and discussions for similar requests
          required: true
