name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out as much as you can — it helps a lot.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
      placeholder: "When I click start, the server shows as running but RCON doesn't connect..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to Server Control page
        2. Click "Start"
        3. Wait for server to show "Running"
        4. Try sending an RCON command
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Server Control
        - Configuration Editor
        - Mod Management / Mod.io
        - Player Tracking / Moderation
        - Profiles
        - SteamCMD
        - RCON / Console
        - Logs
        - Monitoring
        - User Management
        - Docker / Installation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SandPanel version
      description: Docker image tag or commit hash
      placeholder: "v1.0.0 or latest"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Docker Compose (built from source)
        - Docker Compose (Docker Hub images)
        - Manual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant backend logs (`docker logs sandpanel-backend`)
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, anything relevant
      placeholder: |
        - OS: Ubuntu 24.04
        - Docker: 27.0.3
        - Browser: Firefox 130

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I'm running the latest version
          required: false
        - label: I've checked existing issues for duplicates
          required: true
